<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>WBC Cafe</title>
        <!--検索エンジンでページタイトルとともに表示-->
        <meta
            name="description"
            content="ブレンドコーヒとヘルシーなオーガニックフードを提供するカフェ"
        />

        <!--表示領域の横幅を合わせる(スマホ対応)-->
        <meta name="viewport" content="width=device-width,initial-scale=1" />

        <!--ファビコン-->
        <link rel="icon" type="image/png" href="images/favicon.png" />

        <!--リセットCSS-->
        <link
            rel="stylesheet"
            href="https://unpkg.com/ress/dist/ress.min.css"
        />

        <!--Googleフォント-->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Philosopher&display=swap"
            rel="stylesheet"
        />

        <!--オリジナルCSS-->
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <!--ヘッダーエリア-->
        <div class="cover cover-home">
            <header class="page-header wrapper">
                <!--ロゴとページ名-->
                <h1 class="align-center">
                    <a href="index.html"
                        ><img
                            class="logo"
                            src="images/logo.svg"
                            alt="WCBカフェ　ホーム"
                    /></a>
                </h1>
                <!--ナビゲーションメニュー-->
                <nav>
                    <ul class="main-nav font-english">
                        <li><a href="news.html">News</a></li>
                        <li><a href="menu.html">Menu</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </nav>
            </header>
            <!--見出し-->
            <h2 class="page-title font-english">We'll Make Your Day</h2>
        </div>

        <!--本文エリア-->
        <section class="about">
            <!--本文タイトル-->
            <h3 class="heading-large font-english">About Cafe</h3>
            <!--本文-->
            <p>
                WCB
                CAFEは無添加の厳選食材とおしゃれな店内が魅力のカフェです。心と体に優しい、それでいて飽きのこない空間をご用意しています。素材の本来の美味しさを引き出したメニューを楽しみながら、癒しの時間をお過ごしください。
            </p>
            <!--メニューボタン-->
            <div class="align-center">
                <a class="btn" href="menu.html">メニューを見る</a>
            </div>
        </section>

        <!--フッターエリア-->
        <footer class="page-footer">
            <h3 class="heading-large font-english">Infomation</h3>
            <table class="info">
                <tr>
                    <th>住所</th>
                    <td>大阪市中央区大阪城１−１</td>
                </tr>
                <tr>
                    <th>電話</th>
                    <td>03-1111-XXXX</td>
                </tr>
                <tr>
                    <th>営業時間</th>
                    <td>10:00～20:00</td>
                </tr>
                <tr>
                    <th>店休日</th>
                    <td>水曜</td>
                </tr>
            </table>
            <div class="copyright">
                <small>&copy; 2010 WCB Cafe </small>
            </div>
        </footer>
